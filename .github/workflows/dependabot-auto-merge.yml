# Auto merging dependabot PRs after passing testings
# to get info about the PR such as dependency-type, update-type use dependabot/fetch-metadata action
# https://docs.github.com/en/code-security/dependabot/working-with-dependabot/automating-dependabot-with-github-actions

# todo: run lint and tests, and serve or build the apps before merging
# note that some issues happens when serving the app, not when building it.

name: Dependabot Auto Merge
on:
  workflow_call:
permissions:
  # to merge the PR
  contents: write
  pull-requests: write
jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: ${{ github.actor == 'dependabot[bot]' }}
    steps:
      # get information about the PR contents such as the updated dependencies
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2.2.0

      # todo: to auto merge minor (or less) updates only use `if: steps.metadata.outputs.update-type == 'version-update:semver-minor'`
      - name: Enable auto merging for Dependabot PRs
        # Use Github CLI to merge automatically the PR
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
