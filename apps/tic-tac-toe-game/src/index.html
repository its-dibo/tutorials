<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Tic Tac Toe</title>
    <link href="style.css" rel="stylesheet" />
    <script type="module" src="./script.js"></script>
    <meta content="Tic Tac Toe game" name="description" />
  </head>
  <body>
    <div id="container">
      <div id="info">
        <div>
          Player:
          <span id="player"></span>
        </div>
        <div>
          Winner:
          <span id="winner"></span>
        </div>
      </div>
      <div id="board">
        <div class="square sq-top sq-left" data-idx="0"></div>
        <div class="square sq-top" data-idx="1"></div>
        <div class="square sq-top sq-right" data-idx="2"></div>
        <div class="square sq-left" data-idx="3"></div>
        <div class="square" data-idx="4"></div>
        <div class="square sq-right" data-idx="5"></div>
        <div class="square sq-bottom sq-left" data-idx="6"></div>
        <div class="square sq-bottom" data-idx="7"></div>
        <div class="square sq-bottom sq-right" data-idx="8"></div>
      </div>

      <div id="footer">
        <button id="reset" type="button">reset</button>
      </div>
    </div>
  </body>
</html>
